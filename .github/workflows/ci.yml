name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint, type-check, test, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc -b --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:run

      - name: Build
        run: npm run build
        env:
          # Provide stub values so Vite doesn't fail on missing env vars at build time
          VITE_ANTHROPIC_API_KEY: stub
          VITE_GOOGLE_GENERATIVE_AI_API_KEY: stub
          VITE_CLERK_PUBLISHABLE_KEY: pk_test_stub
          VITE_SUPABASE_URL: https://stub.supabase.co
          VITE_SUPABASE_ANON_KEY: stub
